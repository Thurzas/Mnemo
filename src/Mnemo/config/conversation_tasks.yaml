evaluate_task:
  description: >
    Contexte temporel : {temporal_context}

    Analyse ce message utilisateur : {user_message}

    Retourne UNIQUEMENT un objet JSON valide, sans texte autour, avec cette structure :
    {
      "intent": "question | demande_action | mise_a_jour_info | conversation",
      "entities": ["liste", "des", "entités", "nommées"],
      "topics": ["sujets", "principaux"],
      "needs_memory": true,
      "needs_clarification": false,
      "clarification_reason": null,
      "complexity": "simple | moderate | complex",
      "memory_query": "phrase courte et optimisée pour le retrieval mémoire",
      "needs_calendar": false,
      "temporal_reference": "past | present | future | none",
      "reference_date": null
    }

    needs_memory : false uniquement pour les messages triviaux (bonjour, merci, etc.).
    memory_query : reformulée pour maximiser le rappel dans un index vectoriel.
    needs_clarification : true si une question de clarification améliorerait nettement la réponse.
    needs_calendar : true si la question porte sur un agenda ou un planning,
      qu'il soit passé, présent ou futur.
      ("qu'est-ce que j'avais prévu mardi", "quel était mon programme hier",
       "c'est quand", "qu'est-ce que j'ai de prévu", "ai-je le temps").
      needs_memory reste true uniquement si la question porte sur des faits personnels,
      des décisions, des connaissances — pas sur un planning ou un agenda.

    temporal_reference : nature temporelle du message :
      - "past"    : question sur ce qui s'est passé avant maintenant
                    ("hier", "la semaine dernière", "lundi dernier", "qu'ai-je fait")
      - "present" : question sur l'instant présent ou le jour courant
      - "future"  : question sur ce qui est prévu ou à venir
      - "none"    : pas de dimension temporelle particulière

    reference_date : si temporal_reference est "past" ou "future", calcule la date ISO concernée
      en utilisant la date du contexte temporel comme point d'ancrage.
      Exemples (si aujourd'hui est 2026-02-27) :
        "hier"              → "2026-02-26"
        "lundi dernier"     → "2026-02-23"
        "la semaine dernière" → "2026-02-16/2026-02-22"
        "demain"            → "2026-02-28"
      Si la date ne peut pas être déterminée, mettre null.
  expected_output: >
    Un objet JSON valide et uniquement le JSON, sans markdown, sans explication.
  agent: evaluator

retrieve_task:
  description: >
    À partir de cette analyse : {evaluation_result}
    Session courante ID : {session_id}

    1. Utilise TOUJOURS get_session_memory avec le session_id fourni.

    2. Si needs_memory est true, utilise retrieve_memory avec memory_query.
       Si temporal_reference est "past" et reference_date est renseignée,
       reformule la query pour cibler cette date :
       ex: "session 2026-02-26" ou "résumé journée 2026-02-26".

    3. Si needs_calendar est true, utilise get_calendar_events.
       C'est LA source principale pour toutes les questions sur un planning ou agenda,
       passé ou futur. L'outil retourne les événements de la période demandée.
       Si temporal_reference est "past" et reference_date est renseignée,
       passe days=0 et laisse le contexte temporel guider — le calendrier
       contient aussi les événements passés.

    4. Si l'utilisateur pose une question sur les documents disponibles,
       utilise list_documents.

    5. Retourne UNIQUEMENT un JSON avec cette structure :
    {
      "long_term_context": "chunks formatés ou null",
      "calendar_context": "événements formatés ou null",
      "session_context": { ...contenu JSON de la session... },
      "temporal_reference": "past | present | future | none",
      "reference_date": "date ISO concernée ou null",
      "context_summary": "résumé en 2 phrases de ce qui est pertinent pour répondre"
    }
  expected_output: >
    Un objet JSON valide contenant le contexte mémoire assemblé.
  agent: memory_retriever

main_task:
  description: >
    Contexte temporel : {temporal_context}

    Message de l'utilisateur : {user_message}

    Contexte mémoire disponible :
    {memory_context}

    Réponds au message de façon naturelle et personnalisée.

    RÈGLES TEMPORELLES — à respecter absolument :

    Pour les questions sur le passé ("hier", "la semaine dernière", etc.) :
    → Chercher dans long_term_context les résumés de sessions de la date concernée.
    → Le calendrier peut aussi contenir des événements passés utiles — les utiliser
      si leur date correspond à la période demandée.
    → La date d'hier est indiquée dans le contexte temporel ("Hier : ...").
    → NE PAS utiliser des événements d'une autre date pour répondre.
      Si les événements du contexte sont datés d'aujourd'hui et que la question
      porte sur hier, ils ne sont pas la réponse — chercher dans les sessions.
    → Si aucune source (calendrier ou session) ne contient d'info sur la date
      demandée, dire honnêtement qu'on n'a pas l'information.

    Pour les questions sur le présent ou le futur :
    → Utiliser le calendrier et la date actuelle du contexte temporel.

    Ne pas inventer d'événements ou d'activités non présents dans le contexte.
    Ne pas répondre avec des événements d'une date différente de celle demandée.

    CONSCIENCE DES DEADLINES :
    Si le contexte temporel contient une section "Deadlines et evenements proches",
    et que la réponse porte sur un sujet lié (planning, organisation, travail à faire),
    mentionner naturellement les événements pertinents — sans les lister de façon mécanique.
    Exemple : si l'utilisateur parle d'un projet et qu'une deadline tombe demain,
    le signaler en fin de réponse de façon brève et naturelle.
    Ne pas mentionner les deadlines si la question est sans rapport (météo, conversation, etc.).

    Ne préfixe pas ta réponse avec des labels comme "Réponse :" ou "Assistant :".
  expected_output: >
    La réponse finale destinée à l'utilisateur, en texte naturel.
  agent: main_agent