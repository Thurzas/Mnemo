retrieve_task:
  description: >
    À partir de cette analyse : {evaluation_result}
    Session courante ID : {session_id}

    Contexte calendrier pré-chargé (si needs_calendar=true) :
    {calendar_context}

    1. Utilise TOUJOURS get_session_memory avec le session_id fourni.

    2. Si needs_memory est true, utilise retrieve_memory avec memory_query.
       Si temporal_reference est "past" et reference_date est renseignée,
       reformule la query pour cibler cette date :
       ex: "session 2026-02-26" ou "résumé journée 2026-02-26".

    3. Si needs_calendar est true, le contexte calendrier est déjà fourni
       dans le champ calendar_context ci-dessus — utilise-le directement.
       N'appelle PAS get_calendar_events, c'est déjà fait.
       Retranscris calendar_context dans "calendar_context" du JSON de sortie.

    4. Si needs_web est true, utilise web_search avec web_query.
       Le web est utilisé EN COMPLÉMENT de la mémoire, jamais à sa place.
       Ne jamais inclure de données personnelles dans la web_query.

    5. Si l'utilisateur pose une question sur les documents disponibles,
       utilise list_documents.

    6. Retourne UNIQUEMENT un JSON avec cette structure :
    {
      "long_term_context": "chunks formatés ou null",
      "calendar_context": "événements formatés ou null",
      "web_context": "résultats web formatés ou null",
      "session_context": { ...contenu JSON de la session... },
      "temporal_reference": "past | present | future | none",
      "reference_date": "date ISO concernée ou null",
      "context_summary": "résumé en 2 phrases de ce qui est pertinent pour répondre"
    }
  expected_output: >
    Un objet JSON valide contenant le contexte mémoire assemblé.
  agent: memory_retriever

main_task:
  description: >
    Contexte temporel : {temporal_context}

    Calendrier (événements pertinents) :
    {calendar_context}

    Message de l'utilisateur : {user_message}

    Contexte mémoire disponible :
    {memory_context}

    Réponds au message de façon naturelle et personnalisée.

    RÈGLES TEMPORELLES — à respecter absolument :

    Pour les questions sur le passé ("hier", "la semaine dernière", etc.) :
    → Chercher dans long_term_context les résumés de sessions de la date concernée.
    → Le calendrier peut aussi contenir des événements passés utiles — les utiliser
      si leur date correspond à la période demandée.
    → La date d'hier est indiquée dans le contexte temporel ("Hier : ...").
    → NE PAS utiliser des événements d'une autre date pour répondre.
      Si les événements du contexte sont datés d'aujourd'hui et que la question
      porte sur hier, ils ne sont pas la réponse — chercher dans les sessions.
    → Si aucune source (calendrier ou session) ne contient d'info sur la date
      demandée, dire honnêtement qu'on n'a pas l'information.

    Pour les questions sur le présent ou le futur (planning, programme, agenda) :
    → SOURCE PRIMAIRE : la section "Agenda - 7 prochains jours" dans temporal_context.
      Elle liste chaque événement avec son jour nommé, sa date ISO et son heure.
      C'est la vérité calendrier — elle prime sur tout ce qui est dans memory_context.
    → SOURCE SECONDAIRE : le champ "Calendrier" ci-dessus (calendar_context), si renseigné.
    → memory_context ne contient PAS les événements calendrier — ne jamais y chercher
      le programme d'un jour. Les mentions de tâches ou projets dans memory_context sont
      des notes mémorisées, pas des événements agendés.
    → Pour "prochaine session X" : chercher la première occurrence de X dont la date > aujourd'hui.
    → Ne jamais répondre "vérifiez votre calendrier" si temporal_context contient la réponse.
    → Ne jamais confondre l'événement d'aujourd'hui avec "le prochain" si l'utilisateur
      précise qu'il veut l'occurrence suivante.

    Ne pas inventer d'événements ou d'activités non présents dans le contexte.
    Ne pas répondre avec des événements d'une date différente de celle demandée.

    CONSCIENCE DES DEADLINES :
    Si le contexte temporel contient une section "Deadlines et evenements proches",
    et que la réponse porte sur un sujet lié (planning, organisation, travail à faire),
    mentionner naturellement les événements pertinents — sans les lister de façon mécanique.
    Exemple : si l'utilisateur parle d'un projet et qu'une deadline tombe demain,
    le signaler en fin de réponse de façon brève et naturelle.
    Ne pas mentionner les deadlines si la question est sans rapport (météo, conversation, etc.).

    Ne préfixe pas ta réponse avec des labels comme "Réponse :" ou "Assistant :".
  expected_output: >
    La réponse finale destinée à l'utilisateur, en texte naturel.
  agent: main_agent