evaluate_task:
  description: >
    Contexte temporel : {temporal_context}

    Analyse ce message utilisateur : {user_message}

    Retourne UNIQUEMENT un objet JSON valide, sans texte autour, avec cette structure :
    {
      "intent": "question | demande_action | mise_a_jour_info | conversation",
      "entities": ["liste", "des", "entités", "nommées"],
      "topics": ["sujets", "principaux"],
      "needs_memory": true,
      "needs_clarification": false,
      "clarification_reason": null,
      "complexity": "simple | moderate | complex",
      "memory_query": "phrase courte et optimisée pour le retrieval mémoire",
      "needs_calendar": false,
      "needs_web": false,
      "web_query": null,
      "temporal_reference": "past | present | future | none",
      "reference_date": null
    }

    needs_memory : false uniquement pour les messages triviaux (bonjour, merci, etc.).
    memory_query : reformulée pour maximiser le rappel dans un index vectoriel.
    needs_clarification : true si une question de clarification améliorerait nettement la réponse.
    needs_calendar : true si la question porte sur un agenda ou un planning,
      qu'il soit passé, présent ou futur.
      ("qu'est-ce que j'avais prévu mardi", "quel était mon programme hier",
       "c'est quand", "qu'est-ce que j'ai de prévu", "ai-je le temps").
      needs_memory reste true uniquement si la question porte sur des faits personnels,
      des décisions, des connaissances — pas sur un planning ou un agenda.

    needs_web : true dans deux cas uniquement :
      (1) L'utilisateur demande EXPLICITEMENT une recherche web
          (mots-clés : "cherche", "recherche", "googler", "trouve sur internet",
           "dernières news", "actualité", "c'est quoi", "quelle est la dernière version").
      (2) La question nécessite une information récente ou externe que la mémoire
          ne peut pas fournir : actualité, prix du jour, météo, documentation externe.
      TOUJOURS false si la mémoire personnelle ou le calendrier peuvent répondre.
      TOUJOURS false pour les conversations, mises à jour de faits personnels.

    web_query : si needs_web est true, reformule la question en requête de recherche
      concise (3-8 mots), factuelle, sans données personnelles.
      Exemples :
        "c'est quoi la dernière version de Python ?" → "dernière version Python 2026"
        "cherche la doc FastAPI routing"              → "FastAPI routing documentation"
      null si needs_web est false.

    temporal_reference : nature temporelle du message :
      - "past"    : question sur ce qui s'est passé avant maintenant
                    ("hier", "la semaine dernière", "lundi dernier", "qu'ai-je fait")
      - "present" : question sur l'instant présent ou le jour courant
      - "future"  : question sur ce qui est prévu ou à venir
      - "none"    : pas de dimension temporelle particulière

    reference_date : si temporal_reference est "past" ou "future", calcule la date ISO concernée
      en utilisant la date du contexte temporel comme point d'ancrage.
      Exemples (si aujourd'hui est 2026-02-27) :
        "hier"              → "2026-02-26"
        "lundi dernier"     → "2026-02-23"
        "la semaine dernière" → "2026-02-16/2026-02-22"
        "demain"            → "2026-02-28"
      Si la date ne peut pas être déterminée, mettre null.
  expected_output: >
    Un objet JSON valide et uniquement le JSON, sans markdown, sans explication.
  agent: evaluator