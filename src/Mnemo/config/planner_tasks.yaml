planner_task:
  description: >
    Décompose le goal suivant en étapes atomiques et ordonnées.

    GOAL : {goal}

    CONTEXTE DE RECONNAISSANCE (code/fichiers explorés avant planification) :
    {recon_context}

    LACUNES MÉMOIRE CONNUES :
    {memory_gap_summary}

    RÈGLES :
    - Si recon_context est vide, "(non disponible)", ou indique "aucun fichier trouvé",
      ET que le goal est ambigu (stack inconnue, périmètre flou, dépendances implicites),
      alors NE crée PAS de plan — retourne un objet needs_clarification à la place.
    - Si recon_context est vide mais que le goal est suffisamment précis (ex: "créer un
      fichier README", "écrire un script Python"), crée le plan normalement en ajoutant
      une étape "Explorer le code concerné" avec crew_target "reconnaissance".
    - Si memory_gap_summary contient des lacunes bloquantes, ajoute une étape
      "Combler les lacunes mémoire" avec crew_target "curiosity" AVANT les étapes
      qui en dépendent.
    - Maximum 8 étapes. Chaque étape doit être actionnable et précise.
    - crew_target : crew qui exécutera l'étape. Choisis selon les règles STRICTES ci-dessous.
      Valeurs possibles : conversation, shell, note, scheduler, reconnaissance, curiosity, planner

      RÈGLES DE SÉLECTION crew_target (applique ces règles dans l'ordre) :
      → "reconnaissance" si l'étape contient : rechercher, explorer, trouver, lister, scanner,
        inventorier, examiner les fichiers, analyser l'existant
      → "shell" si l'étape contient : créer, écrire, implémenter, développer, générer, coder,
        produire, construire, installer, configurer un fichier/script/composant
      → "shell" si l'étape contient : tester, vérifier, valider, lancer, exécuter, compiler
      → "note" si l'étape contient : analyser, documenter, résumer, évaluer, rédiger une analyse,
        rédiger un rapport, documenter le code (mais PAS créer du code)
      → "conversation" si l'étape contient : définir les specs, planifier, organiser, décider,
        discuter, proposer des options
      → "planner" si l'étape est une grande tâche qui nécessite elle-même plusieurs sous-étapes
      → "conversation" pour tout le reste (cas incertains)

    FORMAT si le goal est suffisamment clair — retourne UNIQUEMENT ce JSON :
    {{
      "title": "Titre court du plan (< 60 caractères)",
      "steps": ["étape 1", "étape 2"],
      "crew_targets": {{"étape 1": "conversation", "étape 2": "shell"}},
      "context_summary": "Ce que l'agent sait du goal (1-3 phrases)"
    }}

    FORMAT si incertitude trop élevée pour planifier — retourne UNIQUEMENT ce JSON :
    {{
      "needs_clarification": true,
      "title": "Titre court du projet (< 60 caractères)",
      "questions": [
        "Question précise 1 (ex: stack technique visée ?)",
        "Question précise 2 (ex: existe-t-il déjà du code ?)",
        "Question précise 3 (optionnel)"
      ]
    }}
  expected_output: >
    Un objet JSON valide : soit {title, steps, crew_targets, context_summary},
    soit {needs_clarification: true, title, questions} si le contexte est insuffisant.
  agent: planner_agent
