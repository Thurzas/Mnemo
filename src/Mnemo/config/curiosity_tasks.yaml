gap_detection_task:
  description: >
    Ton rôle est de détecter UNIQUEMENT les lacunes CONTEXTUELLES dans la mémoire
    de l'agent — celles qu'un schéma statique ne peut pas voir.

    Les lacunes structurelles (prénom absent, section vide...) ont DÉJÀ été
    détectées automatiquement et sont listées ici — ne les répète pas :
    {structural_gaps}

    Voici le contenu actuel de memory.md :
    {memory_content}

    Voici le résumé de la session qui vient de se terminer :
    {session_summary}

    Questions déjà refusées par l'utilisateur (ne pas reproposer) :
    {skipped_questions}

    Cherche uniquement des lacunes contextuelles, par exemple :
    - Un projet mentionné dans la session mais sans objectifs ni contexte dans memory.md
    - Une technologie ou outil évoqué sans préciser l'usage (hobby ? pro ? apprentissage ?)
    - Une préférence implicite dans la façon de parler qui n'est jamais formulée explicitement
    - Un événement ou deadline mentionné sans qu'on sache s'il est toujours d'actualité

    Ne génère pas plus de 3 questions. Si rien de pertinent n'est détectable
    depuis la session, retourne has_gaps: false.

    Retourne UNIQUEMENT un objet JSON valide :
    {
      "has_gaps": true,
      "questions": [
        {
          "id": "hash_court_unique",
          "question": "Question claire et directe ?",
          "section": "section_cible_dans_memory_md",
          "subsection": "sous_section_cible",
          "priority": 3
        }
      ]
    }
  expected_output: >
    Un objet JSON valide avec has_gaps et la liste des questions contextuelles (0 à 3).
  agent: gap_detector

write_answers_task:
  description: >
    L'utilisateur a répondu aux questions suivantes. Pour chaque réponse,
    reformule-la en fait clair et bien structuré, puis écris-la dans memory.md
    via l'outil update_markdown_section.

    Questions et réponses collectées :
    {answers_json}

    Pour chaque entrée :
    1. Reformule la réponse brute en fait précis et utile (1-3 phrases max)
    2. Identifie la section et sous-section appropriées dans memory.md
    3. Appelle update_markdown_section avec le contenu reformulé
    4. Après avoir traité toutes les réponses, appelle sync_memory_db

    Ne pas traiter les réponses vides ou les "passer".
    Être concis — un fait par réponse, pas de paraphrase inutile.
  expected_output: >
    Confirmation que chaque réponse a été écrite dans memory.md et que
    la synchronisation SQLite a été déclenchée.
  agent: questionnaire_agent