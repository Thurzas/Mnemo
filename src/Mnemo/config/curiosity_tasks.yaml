gap_detection_task:
  description: >
    Ton rôle est de détecter les lacunes CONTEXTUELLES dans la mémoire de l'agent
    et de les classifier en deux catégories :

    - BLOQUANTES  : manques qui dégradent significativement un autre module
      (ex : "Projets en cours" vide → le briefing sera creux ; pas de décisions → le planificateur est aveugle)
    - ENRICHISSANTES : manques qui amélioreraient la qualité mais ne bloquent rien d'immédiat
      (ex : style de communication, fuseau horaire, centres d'intérêt)

    Les lacunes structurelles (champs absents détectés automatiquement) sont déjà listées ici
    — ne les répète pas, mais utilise-les pour estimer la complétude :
    {structural_gaps}

    Structure actuelle de memory.md (sections présentes/vides) :
    {memory_overview}

    Extraits pertinents liés à la session (chunks les plus proches) :
    {memory_recent}

    Résumé de la session qui vient de se terminer :
    {session_summary}

    Questions déjà refusées par l'utilisateur (ne pas reproposer) :
    {skipped_questions}

    MEMORY_COMPLETENESS : estime un score entre 0.0 (mémoire vide) et 1.0 (mémoire complète)
    en te basant sur le nombre de sections renseignées dans memory_overview.

    Pour chaque lacune, propose une question à poser à l'utilisateur si pertinent.
    Détermine le label et le format d'écriture selon la section cible :

    Sections ATOMIQUES — réponse écrite sous forme "- **Label** : valeur" :
      "Identité Utilisateur" > "Profil de base"        → labels : Nom/Pseudo, Métier, Localisation, Langue préférée, Fuseau horaire
      "Identité Utilisateur" > "Préférences & style"   → labels : Style de communication, Ton préféré
      "Identité Utilisateur" > "Centres d'intérêt"     → labels : libres mais concis
      "Identité Agent"       > "Rôle & personnalité définis" → labels : Nom de l'agent, Rôle, Personnalité

    Sections NARRATIVES — réponse écrite en prose libre (label vide "") :
      "Connaissances persistantes" > "Projets en cours"
      "Connaissances persistantes" > "Décisions prises & leur raison"
      "Historique des sessions"
      "Identité Agent" > "Ce que l'agent a appris sur lui-même"

    RÈGLES :
    - Maximum 2 lacunes bloquantes et 2 lacunes enrichissantes (4 au total)
    - Si aucune lacune détectable, retourne des listes vides et memory_completeness estimé
    - Ne jamais inclure une question déjà dans skipped_questions
    - Le champ "affects" liste les modules impactés parmi : briefing, conversation, plan

    Retourne UNIQUEMENT un objet JSON valide :
    {{
      "memory_completeness": 0.4,
      "blocking_gaps": [
        {{
          "section": "section_cible_dans_memory_md",
          "subsection": "sous_section_cible",
          "description": "Pourquoi c'est bloquant en une phrase",
          "affects": ["briefing"],
          "priority": 1,
          "label": "Label markdown si section atomique, sinon chaine vide",
          "question": "Question à poser à l'utilisateur, ou vide si non pertinent"
        }}
      ],
      "enriching_gaps": [
        {{
          "section": "section_cible_dans_memory_md",
          "subsection": "sous_section_cible",
          "description": "Ce que ça apporterait en une phrase",
          "affects": ["conversation"],
          "priority": 3,
          "label": "Label markdown si section atomique, sinon chaine vide",
          "question": "Question à poser à l'utilisateur, ou vide si non pertinent"
        }}
      ]
    }}
  expected_output: >
    Un objet JSON valide avec memory_completeness, blocking_gaps et enriching_gaps.
  agent: gap_detector

write_answers_task:
  description: >
    L'utilisateur vient de répondre à des questions sur lui-même.
    Voici ses réponses au format JSON :
    {answers_json}

    Pour chaque entrée dans le JSON :
    1. Si le champ "label" est présent et non vide, formate le contenu ainsi :
         Ecris une ligne markdown de la forme "- **NOM_DU_LABEL** : TEXTE_DE_LA_REPONSE"
         où NOM_DU_LABEL est la valeur du champ label et TEXTE_DE_LA_REPONSE est la réponse.
       Sinon (label vide), reformule en prose concise (1-3 phrases).
    2. Appelle update_markdown_memory avec :
       - section    : la valeur du champ "section" dans le JSON
       - subsection : la valeur du champ "subsection" dans le JSON
       - content    : le contenu formaté selon la règle ci-dessus
       - category   : déduis-la du contenu (identité | préférence | projet | connaissance)
    3. Après avoir écrit TOUS les faits, appelle sync_memory_db

    RÈGLES :
    - Ne jamais inclure ## ou ### dans section ou subsection
    - Ne jamais inventer de contenu non présent dans les réponses
    - Si une réponse est vide ou "passer", l'ignorer complètement
  expected_output: >
    Confirmation que chaque réponse a été écrite dans memory.md et que
    la synchronisation SQLite a été déclenchée.
  agent: questionnaire_agent