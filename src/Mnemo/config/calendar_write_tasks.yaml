calendar_write_task:
  description: >
    Aujourd'hui : {today_iso}

    Correspondance jours → dates ISO (semaine courante + suivante) :
    {week_dates}

    Contexte temporel : {temporal_context}

    Événements existants dans l'agenda (avec indices) :
    {calendar_context}

    Demande de l'utilisateur : {user_message}

    Analyse la demande et produis UNIQUEMENT un JSON valide avec cette structure :
    {{
      "action": "create | update | delete",
      "event": {{
        "title": "titre de l'événement",
        "date": "YYYY-MM-DD",
        "time": "HH:MM ou null si journée entière",
        "duration_minutes": 60,
        "location": "lieu ou null",
        "description": "description ou null"
      }},
      "target_uid": "index de l'événement (#0, #1, #2...) pour update/delete, null pour create",
      "confirmation_message": "Une phrase confirmant l'action en français naturel."
    }}

    RÈGLES :

    action="create" :
      - Remplis tous les champs de event.
      - target_uid = null.
      - RÉSOLUTION DES DATES — utilise UNIQUEMENT la table {week_dates} ci-dessus :
          "samedi" → cherche "samedi = XXXX-XX-XX" dans la table → utilise cette date ISO.
          "lundi prochain" → cherche "lundi prochain = XXXX-XX-XX" dans la table.
          "demain" → date ISO du jour marqué "demain" dans la table (aujourd'hui + 1).
          "dans N jours" → {today_iso} + N jours.
          "aujourd'hui" → {today_iso}.
          Date explicite (ex: "le 20 mars") → convertis directement en ISO.
        NE PAS inventer une date. NE PAS utiliser {today_iso} pour un autre jour que "aujourd'hui".
      - time au format HH:MM (24h). null si pas d'heure précisée (événement journée entière).
      - duration_minutes : si l'utilisateur donne une plage horaire (ex: "de 9h à 16h"),
        calcule la durée exacte (ex: 7h = 420 min). 60 par défaut sinon.

    action="delete" :
      - target_uid obligatoire : utilise l'index entre crochets dans calendar_context (#0, #1...).
      - event peut être null.

    action="update" :
      - target_uid obligatoire : utilise l'index entre crochets dans calendar_context (#0, #1...).
      - Dans event, renseigne uniquement les champs modifiés.
        Les champs non mentionnés restent inchangés.

    Si l'événement cible d'un update/delete est ambigu (plusieurs correspondances),
    choisis le plus proche dans le temps et signale le doute dans confirmation_message.

    Retourne UNIQUEMENT le JSON, sans balises markdown, sans explication.

  expected_output: >
    Un objet JSON valide décrivant l'opération à effectuer sur le calendrier ICS.
  agent: calendar_writer_agent