# ══════════════════════════════════════════════════════════════════
# docker-compose.yml — Mnemo
#
# Usage standard :
#   docker compose run --rm mnemo          # démarre la session interactive
#   docker compose run --rm mnemo train    # entraîne le crew
#   docker compose run --rm mnemo ingest /data/docs/rapport.pdf
#
# Pré-requis :
#   - Ollama installé et lancé sur la machine hôte
#   - Modèles tirés : ollama pull <MODEL> && ollama pull nomic-embed-text
#   - Fichier .env copié depuis .env.example et rempli
# ══════════════════════════════════════════════════════════════════

services:
  mnemo:
    build:
      context: .
      dockerfile: Dockerfile
    image: mnemo:latest
    container_name: mnemo

    # ── Mode interactif obligatoire pour le chat CLI ──────────────
    stdin_open: true
    tty: true

    # ── Variables d'environnement ─────────────────────────────────
    env_file:
      - .env

    # ── Volumes ───────────────────────────────────────────────────
    # data/  → données persistantes (DB, mémoire, sessions, docs)
    # Le chemin hôte est configurable via DATA_DIR dans .env
    volumes:
      - ${DATA_DIR:-./data}:/data

    # ── Réseau ────────────────────────────────────────────────────
    # host.docker.internal → pointe vers la machine hôte (Ollama)
    # Sur Linux, nécessite extra_hosts (automatique sur Mac/Windows)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # ── Restart ───────────────────────────────────────────────────
    restart: "no"   # Session interactive — pas de redémarrage auto