# ══════════════════════════════════════════════════════════════════
# docker-compose.yml — Mnemo  (Phase 3 — durci)
#
# Usage standard :
#   docker compose run --rm mnemo          # démarre la session interactive
#   docker compose run --rm mnemo ingest /data/docs/rapport.pdf
#
# Pré-requis :
#   - Ollama installé et lancé sur la machine hôte
#   - Modèles tirés : ollama pull <MODEL> && ollama pull nomic-embed-text
#   - Fichier .env copié depuis .env.example et rempli
#   - SearXNG optionnel : docker compose --profile search up -d searxng
#
# Réseau :
#   mnemo_net = réseau interne isolé.
#   Mnemo peut joindre Ollama (hôte) et SearXNG (conteneur).
#   Tout autre accès internet est coupé.
# ══════════════════════════════════════════════════════════════════

services:

  # ── Agent principal ─────────────────────────────────────────────
  mnemo:
    build:
      context: .
      dockerfile: Dockerfile
    image: mnemo:latest
    container_name: mnemo

    # ── Mode interactif obligatoire pour le chat CLI ──────────────
    stdin_open: true
    tty: true

    # ── Variables d'environnement ─────────────────────────────────
    env_file:
      - .env
    environment:
      # Redirige le home de l'utilisateur vers /tmp (déjà tmpfs).
      # CrewAI écrit son cache ChromaDB dans HOME/.local/share/data —
      # avec read_only:true, /home/mnemo est non accessible en écriture.
      - HOME=/tmp

    # ── Volumes ───────────────────────────────────────────────────
    # /data  → données persistantes (DB, mémoire, sessions, docs)
    # Tout le reste du filesystem est read-only (défini plus bas).
    # /tmp   → tmpfs en mémoire — nécessaire pour SQLite et pip
    volumes:
      - ${DATA_DIR:-./data}:/data

    tmpfs:
      - /tmp:size=256m,mode=1777
      - /run:size=16m,mode=0755

    # ── Filesystem read-only ──────────────────────────────────────
    # Le code source dans /app est non modifiable depuis le conteneur.
    # Seuls /data et les tmpfs ci-dessus sont accessibles en écriture.
    read_only: true

    # ── Sécurité Linux ───────────────────────────────────────────
    # Retire toutes les capabilities Linux — Mnemo n'en a besoin d'aucune.
    # no-new-privileges : empêche tout setuid / escalade de droits.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # ── Utilisateur non-root ─────────────────────────────────────
    # Défini dans le Dockerfile (uid 1000) — jamais root dans le conteneur.
    user: "1000:1000"

    # ── Limites ressources ────────────────────────────────────────
    # Évite qu'une commande mal formée sature la machine hôte.
    deploy:
      resources:
        limits:
          memory: ${MNEMO_MEMORY_LIMIT:-1g}
          cpus: "${MNEMO_CPU_LIMIT:-2.0}"

    # ── Réseau isolé ──────────────────────────────────────────────
    networks:
      - mnemo_internal   # SearXNG uniquement — réseau isolé
      - mnemo_external   # Ollama sur l'hôte — accès sortant nécessaire

    # ── host.docker.internal → Ollama sur l'hôte ─────────────────
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # ── Restart ───────────────────────────────────────────────────
    restart: "no"

    # ── Dépendances optionnelles ──────────────────────────────────
    depends_on:
      searxng:
        condition: service_healthy
        required: false


  # ── Dashboard web — interface localhost ──────────────────────────
  # Accessible sur http://localhost:8000
  # Démarrer avec : docker compose up -d mnemo-api
  mnemo-api:
    image: mnemo:latest
    container_name: mnemo-api
    entrypoint: ["python", "-u", "-m", "uvicorn"]
    command: ["Mnemo.api:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]

    env_file:
      - .env
    environment:
      - HOME=/tmp
      - DATA_PATH=/data
      # Si le service RVC est actif (profile voice), activer la conversion de voix.
      # Laisser vide pour utiliser Piper seul (TTS sans RVC).
      - RVC_SERVICE_URL=${RVC_SERVICE_URL:-}

    volumes:
      - ${DATA_DIR:-./data}:/data

    tmpfs:
      - /tmp:size=256m,mode=1777
      - /run:size=16m,mode=0755

    read_only: true

    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    user: "1000:1000"

    ports:
      - "${DASHBOARD_HOST:-127.0.0.1}:${DASHBOARD_PORT:-8000}:8000"

    deploy:
      resources:
        limits:
          memory: ${MNEMO_MEMORY_LIMIT:-1g}
          cpus: "${MNEMO_CPU_LIMIT:-2.0}"

    networks:
      - mnemo_internal
      - mnemo_external

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped

    depends_on:
      searxng:
        condition: service_healthy
        required: false
      mnemo-rvc:
        condition: service_healthy
        required: false


  # ── SearXNG — moteur de recherche local (optionnel) ──────────────
  # Lancé uniquement avec : docker compose --profile search up -d searxng
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    profiles:
      - search
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - mnemo_internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-change_me_in_env}



  # ── RVC — conversion de voix (optionnel, profile voice) ─────────
  # Transforme la voix Piper neutre en voix personnalisée (modèle .pth).
  # Démarrer avec : docker compose --profile voice up -d mnemo-rvc
  # mnemo-api appelle ce service via RVC_SERVICE_URL=http://mnemo-rvc:7865
  mnemo-rvc:
    build:
      context: .
      dockerfile: dockerfile.rvc
    image: mnemo-rvc:latest
    container_name: mnemo-rvc
    profiles:
      - voice

    environment:
      - MODELS_DIR=/models
      # Optionnel : pointer un modèle précis si plusieurs .pth dans /models/
      # - RVC_MODEL_PATH=/models/rvc/Voices/seia.pth
      # - RVC_INDEX_PATH=/models/rvc/Voices/seia.index
      - RVC_F0_METHOD=${RVC_F0_METHOD:-harvest}
      - RVC_F0_UP_KEY=${RVC_F0_UP_KEY:-0}
      - RVC_INDEX_RATE=${RVC_INDEX_RATE:-0.75}

    volumes:
      # Modèles RVC — répertoire contenant *.pth et *.index
      - ${VOICES_DIR:-./src/Voices}:/models:ro

    tmpfs:
      - /tmp:size=512m,mode=1777

    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    user: "1000:1000"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    networks:
      - mnemo_internal

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7865/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


  # ── Scheduler — morning briefing (service background) ────────────
  # Génère /data/briefing.md chaque matin à BRIEFING_TIME.
  # Démarrer avec : docker compose up -d mnemo-scheduler
  # Test immédiat : docker compose run --rm mnemo-scheduler --now
  mnemo-scheduler:
    build:
      context: .
      dockerfile: dockerfile.scheduler
    image: mnemo-scheduler:latest
    container_name: mnemo-scheduler

    env_file:
      - .env
    environment:
      - HOME=/tmp
      - DATA_PATH=/data   # forcé absolu — évite résolution depuis WORKDIR

    volumes:
      - ${DATA_DIR:-./data}:/data

    tmpfs:
      - /tmp:size=128m,mode=1777

    read_only: true

    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    user: "1000:1000"

    deploy:
      resources:
        limits:
          memory: ${SCHEDULER_MEMORY_LIMIT:-512m}
          cpus: "1.0"

    networks:
      - mnemo_external

    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Redémarre automatiquement si le container crash ou après un reboot machine.
    # (ne redémarre PAS après docker stop mnemo-scheduler — comportement attendu)
    restart: unless-stopped

    depends_on:
      searxng:
        condition: service_healthy
        required: false

networks:
  mnemo_internal:
    # Réseau isolé — Mnemo ↔ SearXNG uniquement, pas d'accès internet
    driver: bridge
    internal: true
  mnemo_external:
    # Réseau avec accès sortant — nécessaire pour joindre Ollama sur l'hôte
    # La sécurité repose sur cap_drop + read_only, pas sur l'isolation réseau
    driver: bridge

volumes:
  searxng_data: